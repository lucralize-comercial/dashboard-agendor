<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Agendor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: rgba(0,0,0,0.08);
    --text: #1a1a18; --muted: #6b6a66; --accent: #1a5fb4;
    --success: #1e7e4a; --danger: #b32d2d; --info: #1a5fb4;
    --success-bg: #e8f5ee; --danger-bg: #fceaea; --info-bg: #e8f0fb;
    --warning: #a05c00; --warning-bg: #fef3e2;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-dot svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }
  .logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 13px; color: var(--muted); margin-top: 1px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  #lastUpdated { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .filters {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.4rem; margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .filter-label { font-size: 13px; font-weight: 500; color: var(--muted); white-space: nowrap; }
  .period-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .period-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all .15s;
  }
  .period-btn:hover { border-color: var(--accent); color: var(--accent); }
  .period-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .filter-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
  .date-range { display: flex; align-items: center; gap: 8px; }
  input[type="date"] {
    font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 10px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer;
  }
  input[type="date"]:focus { outline: none; border-color: var(--accent); }
  .date-sep { font-size: 13px; color: var(--muted); }

  button {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    background: var(--accent); color: white; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 1.5rem; display: none; }
  .msg.error   { background: var(--danger-bg);  color: var(--danger); }
  .msg.success { background: var(--success-bg); color: var(--success); }
  .msg.info    { background: var(--info-bg);    color: var(--info); }

  /* Métricas */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric-card { background: var(--surface); border-radius: var(--radius); padding: 1rem 1.2rem; border: 1px solid var(--border); }
  .metric-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.2; }
  .metric-value.info    { color: var(--info); }
  .metric-value.success { color: var(--success); }
  .metric-value.danger  { color: var(--danger); }
  .metric-value.warning { color: var(--warning); }
  .metric-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; }
  .metric-footer { margin-top: 8px; }
  .metric-pct { font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .metric-pct.info    { color: var(--info); }
  .metric-pct.success { color: var(--success); }
  .metric-pct.danger  { color: var(--danger); }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--bg); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
  .progress-fill.info    { background: var(--info); }
  .progress-fill.success { background: var(--success); }
  .progress-fill.danger  { background: var(--danger); }

  /* Cards */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.2rem 1.4rem; margin-bottom: 1.5rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 8px; flex-wrap: wrap; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--muted); }
  .period-tag { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; background: var(--bg); padding: 3px 8px; border-radius: 20px; }

  .status-checks { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .check-label {
    display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; user-select: none; padding: 5px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all .15s;
  }
  .check-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; opacity: 0.3; transition: opacity .15s; }
  .check-label.checked .check-dot { opacity: 1; }
  .check-label.open.checked  { color: var(--info);    border-color: var(--info);    background: var(--info-bg); }
  .check-label.won.checked   { color: var(--success); border-color: var(--success); background: var(--success-bg); }
  .check-label.lost.checked  { color: var(--danger);  border-color: var(--danger);  background: var(--danger-bg); }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; height: 240px; }
  .chart-loading {
    display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.88);
    border-radius: var(--radius-sm); align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; font-size: 13px; color: var(--muted);
  }
  .chart-loading.visible { display: flex; }
  .spinner-dark { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }

  /* Rows */
  .row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .row-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .row-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
  .row-value { font-size: 13px; font-weight: 500; }

  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .badge.won  { background: var(--success-bg); color: var(--success); }
  .badge.lost { background: var(--danger-bg);  color: var(--danger); }
  .badge.open { background: var(--info-bg);    color: var(--info); }

  /* Responsável com conversão */
  .owner-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .owner-row:last-child { border-bottom: none; }
  .owner-info { flex: 1; min-width: 0; }
  .owner-name { font-size: 13px; font-weight: 500; }
  .owner-stats { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .owner-conv { text-align: right; flex-shrink: 0; }
  .conv-pct { font-size: 16px; font-weight: 600; }
  .conv-label { font-size: 11px; color: var(--muted); }
  .conv-bar { height: 3px; background: var(--bg); border-radius: 2px; margin-top: 4px; width: 60px; }
  .conv-fill { height: 100%; border-radius: 2px; background: var(--success); }

  select { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
  .empty { font-size: 13px; color: var(--muted); padding: 1rem 0; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 900px) { .three-col { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px) { .two-col, .three-col { grid-template-columns: 1fr; } body { padding: 1rem; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div>
      <div class="logo-text">Dashboard Agendor</div>
      <div class="logo-sub">Funil Comercial</div>
    </div>
  </div>
  <div class="header-actions">
    <span id="lastUpdated">—</span>
    <button onclick="fetchAll()" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Atualizar base
    </button>
  </div>
</header>

<div class="filters">
  <span class="filter-label">Período:</span>
  <div class="period-btns">
    <button class="period-btn" onclick="setPeriod(7,this)">7 dias</button>
    <button class="period-btn active" onclick="setPeriod(30,this)">30 dias</button>
    <button class="period-btn" onclick="setPeriod(90,this)">90 dias</button>
    <button class="period-btn" onclick="setPeriod(365,this)">1 ano</button>
    <button class="period-btn" onclick="setPeriod(0,this)">Todos</button>
  </div>
  <div class="filter-sep"></div>
  <div class="date-range">
    <span class="filter-label">De</span>
    <input type="date" id="dateFrom" onchange="clearActive();applyFilter();">
    <span class="date-sep">até</span>
    <input type="date" id="dateTo" onchange="clearActive();applyFilter();">
  </div>
</div>

<div id="errorMsg" class="msg error"></div>
<div id="successMsg" class="msg success"></div>
<div id="infoMsg" class="msg info"></div>

<!-- Métricas principais -->
<div class="metrics">
  <div class="metric-card">
    <div class="metric-label">Total no período</div>
    <div class="metric-value" id="totalDeals">—</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Valor total</div>
    <div class="metric-value" id="totalValue">—</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Taxa de conversão</div>
    <div class="metric-value success" id="convRate">—</div>
    <div class="metric-sub" id="convSub">—</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Ticket médio (ganhos)</div>
    <div class="metric-value warning" id="avgTicket">—</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Em andamento</div>
    <div class="metric-value info" id="openDeals">—</div>
    <div class="metric-footer">
      <div class="metric-pct info" id="openPct">—</div>
      <div class="progress-bar"><div class="progress-fill info" id="openBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Ganhos</div>
    <div class="metric-value success" id="wonDeals">—</div>
    <div class="metric-footer">
      <div class="metric-pct success" id="wonPct">—</div>
      <div class="progress-bar"><div class="progress-fill success" id="wonBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Perdidos</div>
    <div class="metric-value danger" id="lostDeals">—</div>
    <div class="metric-footer">
      <div class="metric-pct danger" id="lostPct">—</div>
      <div class="progress-bar"><div class="progress-fill danger" id="lostBar" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- Gráficos: funil + origem -->
<div class="two-col" style="margin-bottom:1.5rem;">
  <div class="card" style="margin-bottom:0;">
    <div class="card-header">
      <span class="card-title">Por etapa do funil</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <div class="status-checks">
          <label class="check-label open checked" id="lbl-open" onclick="toggleStatus('open','funnel')"><span class="check-dot" style="background:var(--info)"></span>Andamento</label>
          <label class="check-label won checked" id="lbl-won" onclick="toggleStatus('won','funnel')"><span class="check-dot" style="background:var(--success)"></span>Ganhos</label>
          <label class="check-label lost checked" id="lbl-lost" onclick="toggleStatus('lost','funnel')"><span class="check-dot" style="background:var(--danger)"></span>Perdidos</label>
        </div>
        <span class="period-tag" id="periodTag">—</span>
      </div>
    </div>
    <div class="legend" id="funnelLegend"></div>
    <div class="chart-wrap">
      <canvas id="funnelChart" role="img" aria-label="Por etapa do funil"></canvas>
      <div class="chart-loading" id="chartLoading"><div class="spinner-dark"></div><span>Buscando...</span></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:0;">
    <div class="card-header">
      <span class="card-title">Por origem</span>
      <div class="status-checks">
        <label class="check-label open checked" id="lbl2-open" onclick="toggleStatus('open','origin')"><span class="check-dot" style="background:var(--info)"></span>Andamento</label>
        <label class="check-label won checked" id="lbl2-won" onclick="toggleStatus('won','origin')"><span class="check-dot" style="background:var(--success)"></span>Ganhos</label>
        <label class="check-label lost checked" id="lbl2-lost" onclick="toggleStatus('lost','origin')"><span class="check-dot" style="background:var(--danger)"></span>Perdidos</label>
      </div>
    </div>
    <div class="legend" id="originLegend"></div>
    <div class="chart-wrap">
      <canvas id="originChart" role="img" aria-label="Por origem"></canvas>
    </div>
  </div>
</div>

<!-- Motivo de perda + Responsáveis + Negócios -->
<div class="three-col">
  <div class="card" style="margin-bottom:0;">
    <div class="card-header"><span class="card-title">Motivos de perda</span></div>
    <div id="lossReasonList"><p class="empty">—</p></div>
  </div>
  <div class="card" style="margin-bottom:0;">
    <div class="card-header"><span class="card-title">Responsáveis — conversão</span></div>
    <div id="ownersList"><p class="empty">—</p></div>
  </div>
  <div class="card" style="margin-bottom:0;">
    <div class="card-header">
      <span class="card-title">Negócios</span>
      <select id="filterStatus" onchange="renderDeals()">
        <option value="all">Todos</option>
        <option value="open">Andamento</option>
        <option value="won">Ganhos</option>
        <option value="lost">Perdidos</option>
      </select>
    </div>
    <div id="dealsList"><p class="empty">—</p></div>
  </div>
</div>

<script>
const PROXY = 'https://agendo-proxy.onrender.com';
const COLORS = ['#1a5fb4','#1e7e4a','#a05c00','#8b3a8b','#c0392b','#16697a','#d35400','#2c3e50','#b32d2d','#1d6b4a','#5c7a2e','#6b3a7d','#2e7d8b','#8b6914','#4a7c59'];

let baseDeals = [], filteredDeals = [];
let funnelChart = null, originChart = null;
let chartStatus = {
  funnel: { open:true, won:true, lost:true },
  origin: { open:true, won:true, lost:true }
};

function toISO(d) { return d.toISOString().split('T')[0]; }

function initDates() {
  const to = new Date(), from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('dateTo').value = toISO(to);
  document.getElementById('dateFrom').value = toISO(from);
}

function setPeriod(days, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const to = new Date(), from = new Date();
  if (days > 0) from.setDate(from.getDate() - days);
  else from.setFullYear(2000);
  document.getElementById('dateTo').value = toISO(to);
  document.getElementById('dateFrom').value = toISO(from);
  applyFilter();
}

function clearActive() { document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active')); }

function toggleStatus(type, chart) {
  chartStatus[chart][type] = !chartStatus[chart][type];
  document.getElementById(chart==='funnel'?`lbl-${type}`:`lbl2-${type}`).classList.toggle('checked', chartStatus[chart][type]);
  chart==='funnel' ? updateFunnelChart() : updateOriginChart();
}

function fmt(v) { return 'R$\u00a0' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }
function getOrigem(d) { return d.customFields?.origem_do_negocio?.value || null; }

function setMsg(type, msg) {
  ['errorMsg','successMsg','infoMsg'].forEach(id => document.getElementById(id).style.display='none');
  if (!msg) return;
  const el = document.getElementById(type+'Msg');
  el.textContent = msg; el.style.display = 'block';
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  if (from && to) {
    const fd = new Date(from+'T00:00:00'), td = new Date(to+'T23:59:59');
    filteredDeals = baseDeals.filter(d => { const c = new Date(d.createdAt); return c>=fd && c<=td; });
    const f = s => new Date(s+'T00:00:00').toLocaleDateString('pt-BR');
    document.getElementById('periodTag').textContent = f(from) + ' → ' + f(to);
  } else {
    filteredDeals = [...baseDeals];
    document.getElementById('periodTag').textContent = 'todos os períodos';
  }
  updateMetrics();
  updateFunnelChart();
  updateOriginChart();
  renderLossReasons();
  renderOwners();
  renderDeals();

  document.getElementById('infoMsg').textContent =
    'Mostrando ' + filteredDeals.length + ' de ' + baseDeals.length.toLocaleString('pt-BR') + ' negócios na base';
  document.getElementById('infoMsg').style.display = 'block';
}

function updateMetrics() {
  const d = filteredDeals;
  const total = d.length;
  const open  = d.filter(x=>x.dealStatus?.id===1).length;
  const won   = d.filter(x=>x.dealStatus?.id===2).length;
  const lost  = d.filter(x=>x.dealStatus?.id===3).length;
  const concluded = won + lost;
  const convP = pct(won, concluded);

  const wonDeals = d.filter(x=>x.dealStatus?.id===2);
  const totalWonValue = wonDeals.reduce((s,x)=>s+(x.value||0),0);
  const avgTicket = wonDeals.length ? Math.round(totalWonValue / wonDeals.length) : 0;

  document.getElementById('totalDeals').textContent = total.toLocaleString('pt-BR');
  document.getElementById('totalValue').textContent  = fmt(d.reduce((s,x)=>s+(x.value||0),0));
  document.getElementById('convRate').textContent    = convP + '%';
  document.getElementById('convSub').textContent     = won + ' ganhos de ' + concluded + ' concluídos';
  document.getElementById('avgTicket').textContent   = fmt(avgTicket);
  document.getElementById('openDeals').textContent   = open;
  document.getElementById('wonDeals').textContent    = won;
  document.getElementById('lostDeals').textContent   = lost;

  const openP = pct(open,total), wonP = pct(won,total), lostP = pct(lost,total);
  document.getElementById('openPct').textContent = openP + '% do total';
  document.getElementById('wonPct').textContent  = wonP  + '% do total';
  document.getElementById('lostPct').textContent = lostP + '% do total';
  document.getElementById('openBar').style.width = openP + '%';
  document.getElementById('wonBar').style.width  = wonP  + '%';
  document.getElementById('lostBar').style.width = lostP + '%';
}

function buildChart(canvasId, legendId, statusRef, deals, keyFn) {
  const filtered = deals.filter(d => {
    const sid = d.dealStatus?.id;
    if (sid===1 && !statusRef.open) return false;
    if (sid===2 && !statusRef.won)  return false;
    if (sid===3 && !statusRef.lost) return false;
    return true;
  });
  const map = {};
  filtered.forEach(d => { const k = keyFn(d)||'Não informado'; map[k]=(map[k]||0)+1; });
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const labels = sorted.map(e=>e[0]), counts = sorted.map(e=>e[1]);
  const colors = labels.map((_,i)=>COLORS[i%COLORS.length]);

  document.getElementById(legendId).innerHTML = labels.map((l,i)=>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} (${counts[i]})</span>`
  ).join('');

  return new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: { labels, datasets: [{ data: counts, backgroundColor: colors, borderRadius: 5, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+ctx.parsed.y+' negócios'}} },
      scales: {
        x: { ticks:{font:{size:10,family:'DM Sans'},autoSkip:false,maxRotation:35,color:'#6b6a66'}, grid:{display:false}, border:{display:false} },
        y: { ticks:{font:{size:10,family:'DM Sans'},stepSize:1,color:'#6b6a66'}, grid:{color:'rgba(0,0,0,0.05)'}, border:{display:false} }
      }
    }
  });
}

function updateFunnelChart() {
  if (funnelChart) funnelChart.destroy();
  const sorted = [...filteredDeals].sort((a,b)=>(a.dealStage?.sequence||99)-(b.dealStage?.sequence||99));
  funnelChart = buildChart('funnelChart','funnelLegend',chartStatus.funnel,sorted,d=>d.dealStage?.name);
}

function updateOriginChart() {
  if (originChart) originChart.destroy();
  originChart = buildChart('originChart','originLegend',chartStatus.origin,filteredDeals,getOrigem);
}

function renderLossReasons() {
  const lost = filteredDeals.filter(d=>d.dealStatus?.id===3);
  const map = {};
  lost.forEach(d => {
    const name = d.lossReason?.name || 'Não informado';
    map[name] = (map[name]||0) + 1;
  });
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const total = lost.length;

  const el = document.getElementById('lossReasonList');
  if (!sorted.length) { el.innerHTML = '<p class="empty">Nenhum negócio perdido.</p>'; return; }

  el.innerHTML = sorted.map(([name, count]) => {
    const p = pct(count, total);
    return `<div class="row">
      <div style="min-width:0;flex:1;">
        <div class="row-name">${name}</div>
        <div style="height:3px;background:var(--bg);border-radius:2px;margin-top:5px;overflow:hidden;">
          <div style="height:100%;width:${p}%;background:var(--danger);border-radius:2px;"></div>
        </div>
      </div>
      <div class="row-right" style="margin-left:16px;">
        <div class="row-value" style="color:var(--danger);">${count}</div>
        <div style="font-size:11px;color:var(--muted);">${p}%</div>
      </div>
    </div>`;
  }).join('');
}

function renderOwners() {
  const map = {};
  filteredDeals.forEach(d => {
    const name = d.owner?.name || 'Sem responsável';
    if (!map[name]) map[name] = { total:0, won:0, lost:0, open:0, value:0 };
    map[name].total++; map[name].value += d.value||0;
    if (d.dealStatus?.id===2) map[name].won++;
    else if (d.dealStatus?.id===3) map[name].lost++;
    else map[name].open++;
  });

  const sorted = Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
  document.getElementById('ownersList').innerHTML = sorted.map(([name, s]) => {
    const concluded = s.won + s.lost;
    const conv = pct(s.won, concluded);
    return `<div class="owner-row">
      <div class="owner-info">
        <div class="owner-name">${name}</div>
        <div class="owner-stats">${s.open} abertos · <span style="color:var(--success)">${s.won} ganhos</span> · <span style="color:var(--danger)">${s.lost} perdidos</span></div>
      </div>
      <div class="owner-conv">
        <div class="conv-pct" style="color:${conv>=50?'var(--success)':conv>=25?'var(--warning)':'var(--danger)'}">${conv}%</div>
        <div class="conv-label">conversão</div>
        <div class="conv-bar"><div class="conv-fill" style="width:${conv}%;background:${conv>=50?'var(--success)':conv>=25?'var(--warning)':'var(--danger)'}"></div></div>
      </div>
    </div>`;
  }).join('') || '<p class="empty">Nenhum dado.</p>';
}

function renderDeals() {
  const filter = document.getElementById('filterStatus').value;
  let deals = filteredDeals;
  if (filter==='open') deals = filteredDeals.filter(d=>d.dealStatus?.id===1);
  else if (filter==='won')  deals = filteredDeals.filter(d=>d.dealStatus?.id===2);
  else if (filter==='lost') deals = filteredDeals.filter(d=>d.dealStatus?.id===3);

  const el = document.getElementById('dealsList');
  if (!deals.length) { el.innerHTML = '<p class="empty">Nenhum negócio.</p>'; return; }

  el.innerHTML = deals.slice(0,12).map(d => {
    const name   = d.person?.name || d.organization?.name || d.title || 'Sem nome';
    const stage  = d.dealStage?.name || '—';
    const sId    = d.dealStatus?.id;
    const sLabel = sId===2?'Ganho':sId===3?'Perdido':'Andamento';
    const sClass = sId===2?'won':sId===3?'lost':'open';
    const date   = d.createdAt ? new Date(d.createdAt).toLocaleDateString('pt-BR') : '';
    const origem = getOrigem(d);
    const tag    = origem ? `<span style="color:var(--accent);font-size:11px;"> · ${origem}</span>` : '';
    return `<div class="row">
      <div style="min-width:0;flex:1;">
        <div class="row-name">${name}</div>
        <div class="row-sub">${stage} · ${date}${tag}</div>
      </div>
      <div class="row-right">
        <div class="row-value">${fmt(d.value)}</div>
        <span class="badge ${sClass}">${sLabel}</span>
      </div>
    </div>`;
  }).join('');
}

async function fetchAll() {
  const btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<span class="spinner"></span> Buscando...';
  btn.disabled = true;
  setMsg('','');
  document.getElementById('chartLoading').classList.add('visible');

  try {
    const resp = await fetch(PROXY + '/deals');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const result = await resp.json();
    baseDeals = result.data || [];

    const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdated').textContent = 'Atualizado às ' + now;
    setMsg('success', '✓ ' + baseDeals.length.toLocaleString('pt-BR') + ' negócios carregados');
    applyFilter();
  } catch(e) {
    setMsg('error', '❌ Proxy não encontrado. Certifique-se que o agendor_proxy.py está rodando. (' + e.message + ')');
  }

  document.getElementById('chartLoading').classList.remove('visible');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Atualizar base';
  btn.disabled = false;
}

initDates();
fetchAll();
</script>
</body>
</html>
